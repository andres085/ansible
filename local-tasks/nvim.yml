- name: Add Neovim PPA
  become: true
  apt_repository:
    repo: "ppa:neovim-ppa/unstable"
    state: present
  tags:
    - nvim

- name: Update package cache
  become: true
  apt:
    update_cache: yes
  tags:
    - nvim

- name: Install Neovim
  become: true
  apt:
    name: neovim
    state: present
  tags:
    - nvim

