- name: Ensure .ssh directory exists
  file:
    path: "{{ ssh_dest_dir }}"
    mode: 0700
    state: directory
  tags:
    - ssh

- name: Install SSH private keys
  copy:
    src: "{{ ssh_source_dir }}/{{ item }}"
    dest: "{{ ssh_dest_dir }}/{{ item }}"
    mode: 0600
  loop: "{{ ssh_keys }}"
  tags:
    - ssh

- name: Install SSH public keys
  copy:
    src: "{{ ssh_source_dir }}/{{ item }}.pub"
    dest: "{{ ssh_dest_dir }}/{{ item }}.pub"
    mode: 0644
  loop: "{{ ssh_keys }}"
  tags:
    - ssh

- name: Copy SSH config
  copy:
    src: "{{ ssh_source_dir }}/config"
    dest: "{{ ssh_dest_dir }}/config"
    mode: 0600
  tags:
    - ssh

- name: Set authorized keys
  authorized_key:
    user: "{{ lookup('env', 'USER') }}"
    state: present
    key: "{{ lookup('file', ssh_dest_dir + '/' + item + '.pub') }}"
  loop: "{{ ssh_keys }}"
  tags:
    - ssh
