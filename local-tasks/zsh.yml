- name: Install Zsh
  become: true
  apt:
    name: zsh
    state: present
  tags:
    - zsh

- name: Change Shell
  become: true
  shell: chsh -s $(which zsh) {{ lookup('env', 'USER') }}
  tags:
    - zsh

- name: Install Ohmyszsh
  become_user: "{{ lookup('env', 'USER') }}"
  environment:
    RUNZSH: "no"
  shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    creates: "{{ lookup('env', 'HOME') }}/.oh-my-zsh"
  tags:
    - zsh

- name: Install Powerlevel10k theme
  become_user: "{{ lookup('env', 'USER') }}"
  ansible.builtin.git:
    repo: 'https://github.com/romkatv/powerlevel10k.git'
    dest: "{{ lookup('env', 'HOME') }}/.oh-my-zsh/custom/themes/powerlevel10k"
    depth: 1
  tags:
    - zsh

- name: Install the Zsh plugin autosuggestions
  become_user: "{{ lookup('env', 'USER') }}"
  ansible.builtin.git:
    repo: 'https://github.com/zsh-users/zsh-autosuggestions.git'
    dest: "{{ lookup('env', 'HOME') }}/.oh-my-zsh/plugins/zsh-autosuggestions"
    depth: 1
  tags:
    - zsh