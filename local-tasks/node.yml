- name: Install Node and NPM
  become: true
  apt:
    name: ['nodejs', 'npm']
  tags:
    - node

- name: Install `n` (Node.js Version Manager)
  become: true
  npm:
    name: n
    global: yes
  tags:
    - node

- name: Install Node and use Node.js lts
  become: true
  shell: n lts
  tags:
    - node
