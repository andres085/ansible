- name: Install packages
  become: true
  apt:
    name:
      - tmux
      - fzf
      # - gimp
      # - xclip
      # - golang
      # - i3
      # - nitrogen
      # - mesa-utils
      # - libgl1-mesa-dri
      # - libllvm15
    update_cache: yes
  tags:
    - core-programs

- name: Install tmux-plugin-manager (TPM)
  git:
     repo: https://github.com/tmux-plugins/tpm
     dest: ~/.tmux/plugins/tpm
     version: master
