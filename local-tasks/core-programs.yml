- name: Add universe repository
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: present
  loop:
    - "universe"
    - "ppa:agornostal/ulauncher"
  tags:
    - core-programs

- name: Install packages
  become: true
  apt:
    name:
      - tmux
      - fzf
      - gimp
      - xclip
      - i3
      - nitrogen
      - libgl1-mesa-dri
      - mesa-vulkan-drivers
      - ulauncher
    update_cache: yes
  tags:
    - core-programs
